<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelie — Claim your page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sun:#FFD60A;
    --ink:#141414;
    --grey:#9A9A9A;
    --line:#EDEDED;
    --soft:#F7F7F7;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',-apple-system,sans-serif;
    background:#111;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .phone{
    width:390px;height:844px;
    background:#fff;
    border-radius:54px;
    border:10px solid #000;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
    overflow:hidden;
    position:relative;
    display:flex;flex-direction:column;
    padding:0 28px;
  }
  .notch{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:120px;height:34px;background:#000;border-radius:20px;
  }
  .statusbar{
    height:56px;flex-shrink:0;
    display:flex;align-items:flex-end;justify-content:space-between;
    padding-bottom:4px;
    font-size:14px;font-weight:700;color:var(--ink);
  }
  .nav{
    height:44px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .nav .back{
    position:absolute;left:0;
    font-size:22px;color:var(--ink);text-decoration:none;line-height:1;
  }
  .nav .step{
    font-size:12px;font-weight:700;letter-spacing:1.5px;color:#C9C9C9;
  }
  .top{
    flex-shrink:0;text-align:center;padding-top:26px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-style:italic;font-weight:700;
    font-size:30px;line-height:1.15;
    color:var(--ink);letter-spacing:-.5px;
  }
  .sub{
    margin:12px auto 0;
    font-size:15px;line-height:1.5;
    color:var(--grey);
    max-width:280px;
  }
  .middle{
    flex:1;display:flex;flex-direction:column;justify-content:center;
  }
  .field{
    display:flex;align-items:center;
    border:1.5px solid var(--ink);border-radius:16px;
    padding:0 16px;height:58px;
    gap:2px;
  }
  .field .prefix{
    font-size:16px;font-weight:500;color:var(--grey);
  }
  .field .handle{
    font-size:16px;font-weight:700;color:var(--ink);
    flex:1;
  }
  .field .caret{
    display:inline-block;width:2px;height:20px;background:var(--ink);
    vertical-align:middle;margin-left:1px;
    animation:blink 1.1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion: reduce){.field .caret{animation:none}}
  .avail{
    margin-top:12px;
    display:flex;align-items:center;justify-content:center;gap:7px;
    font-size:13.5px;font-weight:700;color:var(--ink);
  }
  .avail .tick{
    width:18px;height:18px;border-radius:50%;
    background:var(--sun);color:var(--ink);
    display:inline-flex;align-items:center;justify-content:center;
    font-size:10px;
  }
  .hint{
    margin-top:26px;text-align:center;
    font-size:12.5px;line-height:1.6;color:#C9C9C9;
    max-width:270px;margin-left:auto;margin-right:auto;
  }
  .hint b{color:var(--grey);font-weight:500}
  .bottom{flex-shrink:0;padding-bottom:36px}
  .btn-continue{
    width:100%;height:54px;border-radius:16px;border:none;
    background:var(--sun);color:var(--ink);
    font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;
    cursor:pointer;transition:transform .08s ease;
  }
  .btn-continue:active{transform:scale(.98)}
  .btn-continue:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .homebar{
    width:135px;height:5px;border-radius:3px;background:var(--ink);
    margin:14px auto 0;
  }
  @media(max-width:430px){
    body{padding:0}
    .phone{width:100vw;height:100vh;border-radius:0;border:none}
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span></span></div>

    <div class="nav">
      <a class="back" href="#" aria-label="Back">‹</a>
      <span class="step">STEP 2 OF 2</span>
    </div>

    <div class="top">
      <h1>Claim your page</h1>
      <p class="sub">This is the link you'll say in your videos, so keep it easy to type.</p>
    </div>

    <div class="middle">
      <div class="field">
        <span class="prefix">reelie.com/</span>
        <span class="handle">glowbyjess<span class="caret"></span></span>
      </div>
      <div class="avail"><span class="tick">✓</span>It's yours</div>

      <p class="hint">We matched it to your YouTube handle, <b>@glowbyjess</b> — keeping them the same makes it easier for viewers to find you.</p>
    </div>

    <div class="bottom">
      <button class="btn-continue">Claim reelie.com/glowbyjess</button>
      <div class="homebar"></div>
    </div>
  </div>
</body>
</html>
