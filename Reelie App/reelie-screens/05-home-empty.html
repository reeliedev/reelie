<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelie — Home (empty)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sun:#FFD60A;
    --ink:#141414;
    --grey:#9A9A9A;
    --line:#EDEDED;
    --soft:#F7F7F7;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',-apple-system,sans-serif;
    background:#111;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .phone{
    width:390px;height:844px;
    background:#fff;
    border-radius:54px;
    border:10px solid #000;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
    overflow:hidden;
    position:relative;
    display:flex;flex-direction:column;
  }
  .notch{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:120px;height:34px;background:#000;border-radius:20px;z-index:20;
  }
  .statusbar{
    height:56px;flex-shrink:0;
    display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 4px;
    font-size:14px;font-weight:700;color:var(--ink);
  }
  .header{
    flex-shrink:0;text-align:center;padding:14px 28px 4px;
  }
  .wordmark{
    font-family:'Fraunces',serif;
    font-style:italic;font-weight:700;
    font-size:24px;color:var(--ink);letter-spacing:-.5px;
  }
  .wordmark .dot{color:var(--sun)}
  .middle{
    flex:1;
    display:flex;flex-direction:column;justify-content:center;
    padding:0 28px;text-align:center;
  }
  .watching{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--soft);border-radius:999px;
    padding:9px 16px;margin:0 auto;
    font-size:13px;font-weight:700;color:var(--ink);
  }
  .watching .dot{
    width:8px;height:8px;border-radius:50%;background:var(--sun);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  @media (prefers-reduced-motion: reduce){.watching .dot{animation:none}}
  h1{
    font-family:'Fraunces',serif;
    font-style:italic;font-weight:700;
    font-size:28px;line-height:1.2;
    color:var(--ink);letter-spacing:-.5px;
    margin-top:22px;
  }
  .sub{
    margin:12px auto 0;
    font-size:15px;line-height:1.55;
    color:var(--grey);
    max-width:280px;
  }
  /* ghost card */
  .ghost{
    margin-top:30px;
    border:1.5px dashed #E0E0E0;border-radius:18px;
    padding:14px;
    display:flex;align-items:center;gap:13px;
    opacity:.75;
  }
  .gthumb{
    width:54px;height:54px;border-radius:14px;background:var(--soft);
    flex-shrink:0;
  }
  .glines{flex:1}
  .gline{height:11px;border-radius:6px;background:var(--soft);margin-bottom:8px}
  .gline.short{width:60%;margin-bottom:0}
  .gbtn{
    width:64px;height:34px;border-radius:11px;background:var(--soft);flex-shrink:0;
  }
  .ghostnote{
    margin-top:10px;font-size:12px;color:#C9C9C9;
  }
  .orbtn{
    margin-top:28px;
  }
  .btn{
    width:100%;height:54px;border-radius:16px;border:none;
    background:var(--sun);color:var(--ink);
    font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;
    cursor:pointer;transition:transform .08s ease;
  }
  .btn:active{transform:scale(.98)}
  .tabbar{
    flex-shrink:0;
    border-top:1.5px solid var(--line);
    display:flex;
    padding:10px 10px 30px;
    background:#fff;
  }
  .tab{
    flex:1;text-align:center;
    font-size:11.5px;font-weight:700;color:#C9C9C9;
    text-decoration:none;
  }
  .tab .ticon{font-size:21px;display:block;margin-bottom:3px}
  .tab.active{color:var(--ink)}
  .tab.active .under{
    width:5px;height:5px;border-radius:50%;background:var(--sun);
    margin:4px auto 0;
  }
  .homebar{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:135px;height:5px;border-radius:3px;background:var(--ink);
  }
  @media(max-width:430px){
    body{padding:0}
    .phone{width:100vw;height:100vh;border-radius:0;border:none}
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span></span></div>

    <div class="header">
      <div class="wordmark">Reelie<span class="dot">.</span></div>
    </div>

    <div class="middle">
      <div class="watching"><span class="dot"></span>Watching @glowbyjess</div>

      <h1>Post like you<br>always do</h1>
      <p class="sub">The moment your next video is up, we'll build its page and put it right here.</p>

      <div class="ghost">
        <div class="gthumb"></div>
        <div class="glines">
          <div class="gline"></div>
          <div class="gline short"></div>
        </div>
        <div class="gbtn"></div>
      </div>
      <div class="ghostnote">Your first page will appear here</div>

      <div class="orbtn">
        <button class="btn">Make a page from a past video</button>
      </div>
    </div>

    <div class="tabbar">
      <a class="tab active" href="#"><span class="ticon">▦</span>Pages<div class="under"></div></a>
      <a class="tab" href="#"><span class="ticon">◎</span>Earnings</a>
      <a class="tab" href="#"><span class="ticon">◍</span>Profile</a>
    </div>
    <div class="homebar"></div>
  </div>
</body>
</html>
