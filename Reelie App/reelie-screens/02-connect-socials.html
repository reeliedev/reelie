<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelie — Connect your socials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sun:#FFD60A;
    --ink:#141414;
    --grey:#9A9A9A;
    --line:#EDEDED;
    --ok:#1DB954;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',-apple-system,sans-serif;
    background:#111;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .phone{
    width:390px;height:844px;
    background:#fff;
    border-radius:54px;
    border:10px solid #000;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
    overflow:hidden;
    position:relative;
    display:flex;flex-direction:column;
    padding:0 28px;
  }
  .notch{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:120px;height:34px;background:#000;border-radius:20px;
  }
  .statusbar{
    height:56px;flex-shrink:0;
    display:flex;align-items:flex-end;justify-content:space-between;
    padding-bottom:4px;
    font-size:14px;font-weight:700;color:var(--ink);
  }
  .nav{
    height:44px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .nav .back{
    position:absolute;left:0;
    font-size:22px;color:var(--ink);text-decoration:none;line-height:1;
  }
  .nav .step{
    font-size:12px;font-weight:700;letter-spacing:1.5px;color:#C9C9C9;
  }
  .top{
    flex-shrink:0;
    text-align:center;
    padding-top:26px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-style:italic;font-weight:700;
    font-size:30px;line-height:1.15;
    color:var(--ink);
    letter-spacing:-.5px;
  }
  .sub{
    margin:12px auto 0;
    font-size:15px;line-height:1.5;
    color:var(--grey);
    max-width:280px;
  }
  .platforms{
    flex:1;
    display:flex;flex-direction:column;justify-content:center;
    gap:14px;
  }
  .row{
    height:64px;border-radius:18px;
    border:1.5px solid var(--line);
    display:flex;align-items:center;
    padding:0 18px;gap:14px;
    background:#fff;
  }
  .row .name{
    font-size:16px;font-weight:500;color:var(--ink);
    flex:1;text-align:left;
  }
  .row .hint{font-size:12px;color:#C9C9C9;display:block;font-weight:400;margin-top:1px}
  .connect{
    border:none;background:var(--ink);color:#fff;
    font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:700;
    padding:9px 16px;border-radius:12px;cursor:pointer;
    transition:transform .08s ease;
  }
  .connect:active{transform:scale(.97)}
  .connect:focus-visible{outline:3px solid var(--sun);outline-offset:2px}
  .row.connected{border-color:var(--ink)}
  .connected-pill{
    font-size:13.5px;font-weight:700;color:var(--ink);
    display:flex;align-items:center;gap:6px;
  }
  .connected-pill .tick{
    width:18px;height:18px;border-radius:50%;
    background:var(--sun);color:var(--ink);
    display:inline-flex;align-items:center;justify-content:center;
    font-size:11px;
  }
  .row.soon{opacity:.45}
  .soon-tag{
    font-size:12px;font-weight:700;color:#C9C9C9;
    letter-spacing:.5px;
  }
  .picon{width:26px;height:26px;flex-shrink:0}
  .trust{
    flex-shrink:0;
    text-align:center;
    font-size:12.5px;line-height:1.6;color:#BDBDBD;
    max-width:280px;margin:0 auto;
  }
  .trust b{color:var(--grey);font-weight:500}
  .bottom{flex-shrink:0;padding:18px 0 36px}
  .btn-continue{
    width:100%;height:54px;border-radius:16px;border:none;
    background:var(--sun);color:var(--ink);
    font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;
    cursor:pointer;
    transition:transform .08s ease;
  }
  .btn-continue:active{transform:scale(.98)}
  .btn-continue:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .skip{
    display:block;text-align:center;margin-top:14px;
    font-size:14px;font-weight:500;color:var(--grey);
    text-decoration:none;
  }
  .homebar{
    width:135px;height:5px;border-radius:3px;background:var(--ink);
    margin:14px auto 0;
  }
  @media(max-width:430px){
    body{padding:0}
    .phone{width:100vw;height:100vh;border-radius:0;border:none}
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span></span></div>

    <div class="nav">
      <a class="back" href="#" aria-label="Back">‹</a>
      <span class="step">STEP 1 OF 2</span>
    </div>

    <div class="top">
      <h1>Connect your socials</h1>
      <p class="sub">Reelie watches your new posts and builds your pages from them.</p>
    </div>

    <div class="platforms">
      <!-- YouTube: connected state -->
      <div class="row connected">
        <svg class="picon" viewBox="0 0 24 24"><path fill="#FF0000" d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8z"/><path fill="#fff" d="M9.6 15.6V8.4l6.2 3.6z"/></svg>
        <span class="name">YouTube<span class="hint">@glowbyjess</span></span>
        <span class="connected-pill"><span class="tick">✓</span>Connected</span>
      </div>

      <!-- Instagram -->
      <div class="row">
        <svg class="picon" viewBox="0 0 24 24"><defs><radialGradient id="ig" cx="30%" cy="107%" r="150%"><stop offset="0%" stop-color="#fdf497"/><stop offset="5%" stop-color="#fdf497"/><stop offset="45%" stop-color="#fd5949"/><stop offset="60%" stop-color="#d6249f"/><stop offset="90%" stop-color="#285AEB"/></radialGradient></defs><rect width="24" height="24" rx="6" fill="url(#ig)"/><circle cx="12" cy="12" r="4.2" fill="none" stroke="#fff" stroke-width="1.8"/><circle cx="17.4" cy="6.6" r="1.3" fill="#fff"/></svg>
        <span class="name">Instagram<span class="hint">Reels &amp; posts</span></span>
        <button class="connect">Connect</button>
      </div>

      <!-- TikTok: coming soon -->
      <div class="row soon">
        <svg class="picon" viewBox="0 0 24 24"><path fill="#141414" d="M16.6 3c.4 2.1 1.8 3.7 3.9 4.1v3.1c-1.5 0-2.9-.5-3.9-1.2v6.3a5.9 5.9 0 1 1-5.9-5.9c.3 0 .7 0 1 .1v3.2a2.8 2.8 0 1 0 1.9 2.6V3h3z"/></svg>
        <span class="name">TikTok</span>
        <span class="soon-tag">SOON</span>
      </div>
    </div>

    <p class="trust">Reelie only <b>reads the posts you publish</b>. We never post, message, or change anything on your accounts.</p>

    <div class="bottom">
      <button class="btn-continue">Continue</button>
      <a class="skip" href="#">I'll do this later</a>
      <div class="homebar"></div>
    </div>
  </div>
</body>
</html>
