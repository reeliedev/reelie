<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelie — Add a product</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sun:#FFD60A;
    --ink:#141414;
    --grey:#9A9A9A;
    --line:#EDEDED;
    --soft:#F7F7F7;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',-apple-system,sans-serif;
    background:#111;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .phone{
    width:390px;height:844px;
    background:#5c5850;
    border-radius:54px;
    border:10px solid #000;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
    overflow:hidden;
    position:relative;
    display:flex;flex-direction:column;
    justify-content:flex-end;
  }
  .notch{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:120px;height:34px;background:#000;border-radius:20px;z-index:30;
  }
  /* dimmed approval screen behind */
  .behind{
    position:absolute;inset:0;
    background:#fff;
    opacity:.35;
    padding:70px 28px;
    filter:blur(1px);
    pointer-events:none;
  }
  .behind .fakeline{height:14px;border-radius:7px;background:#E5E5E5;margin-bottom:12px}
  .behind .fakecard{height:70px;border-radius:18px;border:1.5px solid #E5E5E5;margin-bottom:10px}
  /* the sheet */
  .sheet{
    position:relative;z-index:20;
    background:#fff;
    border-radius:30px 30px 0 0;
    height:78%;
    display:flex;flex-direction:column;
    padding:0 24px;
    box-shadow:0 -12px 50px rgba(0,0,0,.28);
  }
  .grabber{
    width:40px;height:5px;border-radius:3px;background:#E0E0E0;
    margin:10px auto 0;flex-shrink:0;
  }
  .sheethead{
    text-align:center;padding:16px 0 14px;flex-shrink:0;
    position:relative;
  }
  .sheethead h2{
    font-family:'Fraunces',serif;font-style:italic;font-weight:700;
    font-size:22px;color:var(--ink);letter-spacing:-.3px;
  }
  .sheethead .close{
    position:absolute;right:0;top:14px;
    width:30px;height:30px;border-radius:50%;
    background:var(--soft);border:none;color:var(--grey);
    font-size:14px;font-weight:700;cursor:pointer;
  }
  .search{
    flex-shrink:0;
    display:flex;align-items:center;gap:10px;
    background:var(--soft);border-radius:14px;
    padding:13px 14px;
  }
  .search .mag{font-size:15px;color:var(--grey)}
  .search .q{
    font-size:15px;font-weight:500;color:var(--ink);flex:1;
  }
  .search .q .caret{
    display:inline-block;width:2px;height:18px;background:var(--ink);
    vertical-align:middle;margin-left:1px;
    animation:blink 1.1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion: reduce){.search .q .caret{animation:none}}
  .results{
    flex:1;overflow-y:auto;padding:6px 0 16px;
  }
  .seclabel{
    font-size:11px;font-weight:700;letter-spacing:1.5px;
    color:#C9C9C9;margin:14px 2px 9px;
  }
  .prow{
    display:flex;align-items:center;gap:12px;
    padding:10px 2px;
    border-bottom:1.5px solid #F5F5F5;
  }
  .pthumb{
    width:42px;height:42px;border-radius:11px;background:var(--soft);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;
  }
  .pinfo{flex:1;min-width:0;text-align:left}
  .pbrand{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--grey);text-transform:uppercase}
  .pname{
    font-size:14px;font-weight:500;color:var(--ink);margin-top:2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .pname b{font-weight:700;background:rgba(255,214,10,.35);border-radius:3px;padding:0 1px}
  .rate{
    font-size:11px;font-weight:700;color:var(--grey);margin-top:2px;
  }
  .addbtn{
    border:1.5px solid var(--ink);background:#fff;color:var(--ink);
    font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;
    padding:8px 15px;border-radius:11px;cursor:pointer;flex-shrink:0;
    transition:transform .08s ease;
  }
  .addbtn:active{transform:scale(.96)}
  .addbtn.added{background:var(--sun);border-color:var(--sun)}
  .manual{
    flex-shrink:0;
    text-align:center;
    padding:12px 0 30px;
    font-size:13px;color:#BDBDBD;
  }
  .manual a{color:var(--ink);font-weight:700;text-decoration:none;border-bottom:1.5px solid var(--sun)}
  .homebar{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:135px;height:5px;border-radius:3px;background:var(--ink);z-index:40;
  }
  @media(max-width:430px){
    body{padding:0}
    .phone{width:100vw;height:100vh;border-radius:0;border:none}
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>

    <!-- dimmed approval screen behind the sheet -->
    <div class="behind">
      <div class="fakeline" style="width:55%;margin:40px auto 24px"></div>
      <div class="fakecard"></div>
      <div class="fakecard"></div>
      <div class="fakecard"></div>
    </div>

    <div class="sheet">
      <div class="grabber"></div>
      <div class="sheethead">
        <h2>Add a product</h2>
        <button class="close" aria-label="Close">✕</button>
      </div>

      <div class="search">
        <span class="mag">⌕</span>
        <span class="q">laneige lip<span class="caret"></span></span>
      </div>

      <div class="results">
        <div class="seclabel">RESULTS</div>

        <div class="prow">
          <div class="pthumb">💤</div>
          <div class="pinfo">
            <div class="pbrand">Laneige</div>
            <div class="pname"><b>Lip</b> Sleeping Mask — Berry</div>
            <div class="rate">earns 6%</div>
          </div>
          <button class="addbtn added">Added ✓</button>
        </div>

        <div class="prow">
          <div class="pthumb">💄</div>
          <div class="pinfo">
            <div class="pbrand">Laneige</div>
            <div class="pname"><b>Lip</b> Glowy Balm — Peach</div>
            <div class="rate">earns 6%</div>
          </div>
          <button class="addbtn">Add</button>
        </div>

        <div class="prow">
          <div class="pthumb">✨</div>
          <div class="pinfo">
            <div class="pbrand">Laneige</div>
            <div class="pname"><b>Lip</b> Treatment Balm</div>
            <div class="rate">earns 6%</div>
          </div>
          <button class="addbtn">Add</button>
        </div>

        <div class="seclabel">FROM YOUR CAPTION</div>

        <div class="prow" style="border-bottom:none">
          <div class="pthumb">🌸</div>
          <div class="pinfo">
            <div class="pbrand">Peripera</div>
            <div class="pname">Ink Velvet Lip Tint — #8</div>
            <div class="rate">mentioned in your caption · earns 7%</div>
          </div>
          <button class="addbtn">Add</button>
        </div>
      </div>

      <div class="manual">Can't find it? <a href="#">Add it manually</a></div>
    </div>
    <div class="homebar"></div>
  </div>
</body>
</html>
