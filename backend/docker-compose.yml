# Local prod-like stack: API + Postgres. `docker compose up --build`
# Mirrors production (Postgres + REELIE_ENV=prod) without any cloud account.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reelie
      POSTGRES_PASSWORD: reelie
      POSTGRES_DB: reelie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reelie"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      REELIE_ENV: prod
      DATABASE_URL: postgresql+psycopg://reelie:reelie@db:5432/reelie
      JWT_SECRET: local-compose-secret-change-me
      ALLOWED_ORIGINS: "http://localhost:3000,https://reelie.shop"
    ports:
      - "8000:8000"

volumes:
  pgdata:
